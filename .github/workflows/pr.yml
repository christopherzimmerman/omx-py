name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover -s tests/unit -v
        env:
          PYTHONPATH: src

  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax (compileall)
        run: python -m compileall -q src/omx/

      - name: Zero-dependency audit
        run: |
          VIOLATIONS=$(grep -rn "^import\|^from" src/omx/ \
            --include="*.py" \
            | grep -v "__future__\|from omx\.\|import omx\." \
            | grep -v "import json\|import os\|import sys\|import re" \
            | grep -v "import signal\|import time\|import uuid\|import shutil" \
            | grep -v "import subprocess\|import threading\|import tempfile\|import random" \
            | grep -v "import argparse\|import ctypes" \
            | grep -v "from pathlib\|from typing\|from dataclasses\|from enum\|from datetime" \
            | grep -v "import tomllib\|import fcntl\|import msvcrt" \
            | grep -v "import urllib\|from unittest" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Non-stdlib imports detected:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "Zero-dependency audit passed"
